<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro YouTube Viewer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* CSS Variables for easy color management */
      :root {
        --primary-red: #ff0000;
        --primary-hover: #ff3333;
        --bg-dark: #0f1115;
        --card-bg: rgba(255, 255, 255, 0.03);
        --card-border: rgba(255, 255, 255, 0.08);
        --text-main: #ffffff;
        --text-muted: #a0aab2;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
      }

      body {
        /* Beautiful dark mesh gradient background */
        background-color: var(--bg-dark);
        background-image:
          radial-gradient(at 0% 0%, rgba(255, 0, 0, 0.15) 0px, transparent 50%),
          radial-gradient(
            at 100% 100%,
            rgba(255, 0, 0, 0.05) 0px,
            transparent 50%
          );
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      /* Glassmorphism Card Effect */
      .app-container {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 700px;
        animation: slideUp 0.6s ease-out forwards;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      /* Pure CSS YouTube Play Icon */
      .play-icon {
        width: 32px;
        height: 24px;
        background-color: var(--primary-red);
        border-radius: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .play-icon::before {
        content: "";
        border-style: solid;
        border-width: 5px 0 5px 10px;
        border-color: transparent transparent transparent white;
      }

      .header p {
        color: var(--text-muted);
        font-size: 15px;
        font-weight: 400;
      }

      /* Premium Input Field Styling */
      .input-group {
        position: relative;
        margin-bottom: 24px;
      }

      textarea {
        width: 100%;
        height: 90px;
        padding: 16px;
        background: rgba(0, 0, 0, 0.2);
        color: var(--text-main);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        resize: none;
        font-family: "Inter", monospace;
        font-size: 14px;
        line-height: 1.5;
        transition: all 0.3s ease;
      }

      textarea::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      textarea:focus {
        outline: none;
        border-color: var(--primary-red);
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.1);
      }

      /* Sleek Buttons */
      .button-group {
        display: flex;
        gap: 16px;
        margin-bottom: 30px;
      }

      button {
        flex: 1;
        padding: 14px 24px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }

      button:active {
        transform: scale(0.97);
      }

      #showBtn {
        background: linear-gradient(
          135deg,
          var(--primary-red) 0%,
          #c20000 100%
        );
        color: white;
        box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
      }

      #showBtn:hover {
        box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
        transform: translateY(-2px);
      }

      #clearBtn {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        border: 1px solid var(--card-border);
      }

      #clearBtn:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      /* The Video Player Area */
      .video-wrapper {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: #000;
        border-radius: 16px;
        overflow: hidden;
        display: none;
        position: relative;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .video-wrapper.active {
        display: block;
        opacity: 1;
        transform: translateY(0);
      }

      .video-wrapper iframe {
        width: 100%;
        height: 100%;
        border: none;
        position: absolute;
        top: 0;
        left: 0;
      }

      /* Mobile Optimization */
      @media (max-width: 600px) {
        .app-container {
          padding: 24px;
          border-radius: 20px;
        }
        .header h1 {
          font-size: 24px;
        }
        .button-group {
          flex-direction: column;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="header">
        <h1>
          <div class="play-icon"></div>
          Pro YouTube Viewer
        </h1>
        <p>Paste any YouTube link, Live Stream URL, or embed code.</p>
      </div>

      <div class="input-group">
        <textarea
          id="embedInput"
          placeholder="e.g. https://www.youtube.com/watch?v=..."
        ></textarea>
      </div>

      <div class="button-group">
        <button id="showBtn">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          Load Video
        </button>
        <button id="clearBtn">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path
              d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            ></path>
          </svg>
          Clear
        </button>
      </div>

      <div id="videoContainer" class="video-wrapper"></div>
    </div>

    <script>
      const btn = document.getElementById("showBtn");
      const clearBtn = document.getElementById("clearBtn");
      const input = document.getElementById("embedInput");
      const container = document.getElementById("videoContainer");

      btn.addEventListener("click", function () {
        const userInput = input.value.trim();

        if (!userInput) {
          // Add a subtle shake animation for errors instead of an ugly alert
          input.style.animation = "shake 0.4s";
          setTimeout(() => (input.style.animation = ""), 400);
          return;
        }

        // Raw iframe check
        if (
          userInput.toLowerCase().includes("<iframe") &&
          userInput.toLowerCase().includes("</iframe>")
        ) {
          loadVideo(userInput);
          return;
        }

        // Enhanced Regex Check
        const regExp =
          /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/)([^#\&\?]*).*/;
        const match = userInput.match(regExp);

        if (match && match[2].length === 11) {
          const videoId = match[2];
          const autoIframe = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
          loadVideo(autoIframe);
        } else {
          input.style.border = "1px solid var(--primary-red)";
          setTimeout(
            () => (input.style.border = "1px solid var(--card-border)"),
            2000,
          );
          input.value = "Invalid URL - Please try again";
          setTimeout(() => (input.value = ""), 1500);
          hideVideo();
        }
      });

      clearBtn.addEventListener("click", function () {
        input.value = "";
        hideVideo();
      });

      // Helper functions for smooth loading
      function loadVideo(html) {
        container.innerHTML = html;
        container.classList.add("active");

        // UX Enhancement: Change button text briefly
        const originalText = btn.innerHTML;
        btn.innerHTML = "Loaded!";
        setTimeout(() => (btn.innerHTML = originalText), 1500);
      }

      function hideVideo() {
        container.classList.remove("active");
        // Wait for transition to finish before removing HTML
        setTimeout(() => (container.innerHTML = ""), 500);
      }

      // Add shake animation CSS dynamically for errors
      const style = document.createElement("style");
      style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
